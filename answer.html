<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antwoord — Stam...</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>Voer je antwoord in</h1>
    <p class="subtitle">Het antwoord is niet hoofdlettergevoelig.</p>

    <form id="answer-form">
      <input
        id="answer-input"
        type="text"
        placeholder="Jouw antwoord..."
        autocomplete="off"
        autofocus
      />
      <button type="submit">Controleer &rarr;</button>
    </form>

    <p id="message" class="message"></p>

    <a href="index.html" class="back-link">&larr; Terug naar de aanwijzing</a>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
