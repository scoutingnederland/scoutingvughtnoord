<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blauw — Stam!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>Blauw!</h1>
    <p class="subtitle">Goed zo! Maar er is nog een vraag...</p>

    <div class="hint-box">
      Op welk nummer is jullie terrein?
    </div>

    <form id="answer-form">
      <input
        id="answer-input"
        type="text"
        placeholder="Jouw antwoord..."
        autocomplete="off"
        autofocus
      />
      <button type="submit">Controleer &rarr;</button>
    </form>

    <p id="message" class="message"></p>

    <a href="index.html" class="back-link">&larr; Terug naar het begin</a>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
